services:
  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - chromadb_data:/chroma/.chroma/index
    networks:
      - hexagon-network

  hexagonchat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - DATABASE_URL=file:/app/sqlite/HexagonChat.sqlite
      - REDIS_HOST=redis
      - SECRET=${SECRET:-your-secret-key-change-in-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ~/.hexagonchat:/app/sqlite
    networks:
      - hexagon-network
    depends_on:
      - chromadb
      - redis

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - hexagon-network

networks:
  hexagon-network:
    driver: bridge

volumes:
  chromadb_data:
  redis_data: