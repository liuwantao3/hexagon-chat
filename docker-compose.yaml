services:
  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - chromadb_volume:/chroma/chroma

  hexagonchat:
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - DATABASE_URL=file:/app/sqlite/HexagonChat.sqlite
      - REDIS_HOST=redis
      - SECRET=${SECRET}
      # - COHERE_API_KEY=xxxxx
      # - COHERE_MODEL=ms-marco-MiniLM-L-6-v2
      # - COHERE_BASE_URL=http://peanutshell:8000/v1
      - CODE_RUNNER_URL=http://code-runner:8080
    image: 0001coder/hexagon-chat:latest
    pull_policy: always
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ~/.hexagonchat:/app/sqlite

  redis:
    image: redis:latest
    restart: always
    volumes:
      - redis_data:/data

  peanutshell:
    image: ghcr.io/sugarforever/peanut-shell:latest
    volumes:
      - hf_data:/root/.cache

  code-runner:
    build:
      context: ./code-runner
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - code-runner-output:/tmp/code-runner-output
    restart: always
    privileged: true
    depends_on:
      - code-runner-python

  code-runner-python:
    build:
      context: ./code-runner/images/python
      dockerfile: Dockerfile
    image: code-runner-python:latest
    pull_policy: never

volumes:
  chromadb_volume:
  redis_data:
  hf_data:
  code-runner-output:
