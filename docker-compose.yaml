services:
  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - chromadb_volume:/chroma/chroma
    networks:
      - hexagon-network

  hexagonchat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - DATABASE_URL=file:/app/sqlite/HexagonChat.sqlite
      - REDIS_HOST=redis
      - SECRET=${SECRET:-your-secret-key-change-in-production}
      - CODE_RUNNER_URL=http://code-runner:8080
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ~/.hexagonchat:/app/sqlite
    networks:
      - hexagon-network
    depends_on:
      - chromadb
      - redis

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - hexagon-network

  code-runner:
    build:
      context: ./code-runner
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - code-runner-output:/tmp/code-runner-output
    restart: always
    privileged: true
    networks:
      - hexagon-network
    depends_on:
      - code-runner-python

  code-runner-python:
    build:
      context: ./code-runner/images/python
      dockerfile: Dockerfile
    image: code-runner-python:latest
    pull_policy: never
    restart: always
    networks:
      - hexagon-network

networks:
  hexagon-network:
    driver: bridge

volumes:
  chromadb_volume:
  redis_data:
  code-runner-output: