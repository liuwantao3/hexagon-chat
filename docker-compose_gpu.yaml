services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - hexagon-network

  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - chromadb_data:/chroma/.chroma/index
    networks:
      - hexagon-network

  hexagonchat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - DATABASE_URL=file:/app/sqlite/HexagonChat.sqlite
      - REDIS_HOST=redis
      - SECRET=${SECRET:-your-secret-key-change-in-production}
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ~/.hexagonchat:/app/sqlite
    networks:
      - hexagon-network
    depends_on:
      - ollama
      - chromadb
      - redis

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - hexagon-network

networks:
  hexagon-network:
    driver: bridge

volumes:
  chromadb_data:
  ollama_data:
  redis_data: